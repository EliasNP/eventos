<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Comunión - Lucas</title>
    <!-- Fuentes elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #87ceeb; /* Azul cielo suave */
            --secondary: #2c3e50;
            --accent: #d4af37; 
            --white: #ffffff;
            --cloud-white: rgba(255, 255, 255, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f0f7ff;
            color: var(--secondary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Fondo de nubes azules y blancas */
        .cloud-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, #d6eaff 0%, #ffffff 100%);
            background-attachment: fixed;
        }

        .cloud {
            position: absolute;
            background: var(--white);
            filter: blur(50px);
            border-radius: 50%;
            opacity: 0.6;
            pointer-events: none;
        }

        .main-content {
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 0 0 50px 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* Recreación de la Cruz con Palomas y Olivo */
        .religious-logo {
            width: 180px;
            height: auto;
            margin: 0 auto 20px;
            display: block;
        }

        .hero h2 {
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.85rem;
            color: #5ba2cc;
            margin-bottom: 5px;
        }

        .hero h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4.2rem;
            color: var(--secondary);
            margin: 5px 0;
            font-weight: 400;
        }

        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
            color: #333;
            margin-top: -10px;
            margin-bottom: 20px;
            display: block;
        }

        .date-box {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            border-top: 1px solid rgba(0,0,0,0.1);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 12px 0;
            display: inline-block;
            width: 85%;
            margin-top: 10px;
            color: #444;
        }

        /* --- COUNTDOWN --- */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
        }

        .timer-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 8px;
            border-radius: 15px;
            min-width: 70px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,1);
        }

        .timer-val {
            display: block;
            font-size: 1.6rem;
            font-weight: 600;
            color: #5ba2cc;
        }

        .timer-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
        }

        /* --- CARDS --- */
        .section-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 35px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(160, 196, 255, 0.15);
            border: 1px solid white;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 177.77%; 
            height: 0;
            overflow: hidden;
            border-radius: 25px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .upload-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin-bottom: 10px;
            color: #444;
        }

        .mega-container {
            margin-top: 20px;
            background: #fff;
            border: 2px dashed #b8daff;
            border-radius: 25px;
            padding: 25px 10px;
        }

        /* --- DECORATIONS --- */
        .divider {
            margin: 30px auto;
            position: relative;
            width: 120px;
            height: 20px;
        }
        
        .divider svg {
            width: 30px;
            fill: #b8daff;
        }

        footer {
            padding: 30px 0 50px;
            font-size: 0.85rem;
            color: #777;
        }

        /* Animaciones */
        .up-fade {
            animation: upFade 1.2s ease-out forwards;
        }

        @keyframes upFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Fondo de nubes -->
    <div class="cloud-background">
        <div class="cloud" style="width: 300px; height: 200px; top: 10%; left: -50px;"></div>
        <div class="cloud" style="width: 400px; height: 300px; top: 40%; right: -100px;"></div>
        <div class="cloud" style="width: 250px; height: 150px; bottom: 10%; left: 20%;"></div>
    </div>

    <div class="main-content">
        
        <header class="hero up-fade">
            <!-- SVG que recrea la imagen de la cruz, palomas y olivo -->
            <svg class="religious-logo" viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
                <!-- Ramas de olivo -->
                <path d="M60,150 Q40,130 50,100 M60,150 Q75,135 70,110" stroke="#8da87e" stroke-width="2" fill="none" />
                <path d="M140,150 Q160,130 150,100 M140,150 Q125,135 130,110" stroke="#8da87e" stroke-width="2" fill="none" />
                <!-- Cruz de madera -->
                <rect x="92" y="40" width="16" height="110" rx="8" fill="#d2b48c" stroke="#a67c52" stroke-width="1.5" />
                <rect x="55" y="75" width="90" height="16" rx="8" fill="#d2b48c" stroke="#a67c52" stroke-width="1.5" />
                <!-- Palomas -->
                <g transform="translate(30, 20)">
                    <path d="M10,25 Q20,10 40,25 Q35,40 15,35 Z" fill="white" stroke="#ccc" />
                    <circle cx="35" cy="22" r="1.5" fill="black" />
                </g>
                <g transform="translate(130, 20) scale(-1, 1)">
                    <path d="M10,25 Q20,10 40,25 Q35,40 15,35 Z" fill="white" stroke="#ccc" />
                    <circle cx="35" cy="22" r="1.5" fill="black" />
                </g>
            </svg>

            <h2>Mi Primera Comunión</h2>
            <h1>Lucas</h1>
            <span class="signature">Lucas S.V.</span>
            
            <div class="date-box">
                9 de Mayo de 2026
            </div>
        </header>

        <!-- Contador -->
        <div class="countdown up-fade" style="animation-delay: 0.2s">
            <div class="timer-item">
                <span class="timer-val" id="days">00</span>
                <span class="timer-label">Días</span>
            </div>
            <div class="timer-item">
                <span class="timer-val" id="hours">00</span>
                <span class="timer-label">Horas</span>
            </div>
            <div class="timer-item">
                <span class="timer-val" id="mins">00</span>
                <span class="timer-label">Min</span>
            </div>
        </div>

        <!-- Video Section -->
        <div class="section-card up-fade" style="animation-delay: 0.4s">
            <h3 class="upload-title" style="margin-bottom: 20px; font-family: 'Great Vibes', cursive; font-size: 2.2rem;">¡Bienvenidos!</h3>
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube.com/embed/dRnHQgA-UEE?autoplay=1&mute=1&loop=1&playlist=dRnHQgA-UEE&controls=0&modestbranding=1" 
                    title="Bienvenida Lucas" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <div class="divider">
            <svg viewBox="0 0 24 24"><path d="M21,11C21,16.5 16.5,21 11,21C5.5,21 1,16.5 1,11C1,5.5 5.5,1 11,1C12,1 13,1.2 14,1.5L12.5,3C12,3 11.5,3 11,3C6.5,3 3,6.5 3,11C3,15.5 6.5,19 11,19C15.5,19 19,15.5 19,11C19,10.5 19,10 18.9,9.5L20.5,8C20.8,9 21,10 21,11M22.6,3L14.9,10.7L13.5,9.3L21.2,1.6L22.6,3M11.2,15.4L7.5,11.7L8.9,10.3L11.2,12.6L16,7.8L17.4,9.2L11.2,15.4Z" /></svg>
        </div>

        <!-- Fotos Section -->
        <div class="section-card up-fade" style="animation-delay: 0.6s">
            <h3 class="upload-title">Recuerdos del Día</h3>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 15px; padding: 0 10px;">
                ¡Me encantaría tener todas vuestras fotos! Podéis subirlas aquí mismo:
            </p>
            
            <div class="mega-container">
                <iframe width="250" height="54" frameborder="0" src="https://mega.nz/filerequest#!JLrTxq0Nfyc!l!es"></iframe>
            </div>
        </div>

        <footer>
            <p>Con mucho cariño, Lucas</p>
            <p style="margin-top: 8px; font-size: 0.7rem; opacity: 0.6;">2026 • Mi Primera Comunión</p>
        </footer>

    </div>

    <script>
        const targetDate = new Date("May 9, 2026 12:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const gap = targetDate - now;

            const second = 1000;
            const minute = second * 60;
            const hour = minute * 60;
            const day = hour * 24;

            const d = Math.floor(gap / day);
            const h = Math.floor((gap % day) / hour);
            const m = Math.floor((gap % hour) / minute);

            document.getElementById('days').innerText = d < 10 ? '0'+d : d;
            document.getElementById('hours').innerText = h < 10 ? '0'+h : h;
            document.getElementById('mins').innerText = m < 10 ? '0'+m : m;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
